<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="aeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA500"></stop>
      <stop offset="100%" stop-color="#FF2A00"></stop>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#666" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- ae text logo -->
  <text x="250" y="150" text-anchor="middle" font-family="Arial Black, Poppins, sans-serif" font-size="150" font-weight="900" letter-spacing="-18" fill="url(#aeGradient)" filter="url(#shadow)">
    ae
  </text>

  <!-- Brand name -->
  <text x="250" y="240" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="30" font-weight="700" fill="#000">
    Abbie Essentials
  </text>
</svg>