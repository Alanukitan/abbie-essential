<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="aeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA500"></stop>
      <stop offset="100%" stop-color="#FF2A00"></stop>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#666" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- Connected ae -->
  <g transform="translate(70,40)" filter="url(#shadow)">
    
    <!-- a -->
    <path d="
      M90,130
      C30,130 30,50 95,50
      C150,50 180,75 190,110
      L150,110
      C145,90 125,80 100,80
      C70,80 65,130 100,130
      C125,130 145,120 150,105
      L190,105
      C180,140 145,160 90,160
      Z
    " fill="url(#aeGradient)"></path>

    <!-- e touching a -->
    <path d="
      M175,105
      C180,70 210,50 255,50
      C315,50 340,80 340,110
      L280,110
      L280,85
      L305,85
      C298,75 285,72 260,72
      C225,72 220,130 260,130
      C285,130 305,122 320,108
      L345,130
      C320,150 290,160 245,160
      C195,160 170,135 175,105
      Z
    " fill="url(#aeGradient)"></path>

  </g>

  <!-- Brand name -->
  <text x="250" y="250" font-family="Poppins, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="#000">
    Abbie Essentials
  </text>
</svg>